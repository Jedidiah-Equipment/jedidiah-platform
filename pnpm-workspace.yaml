packages:
  - "pkg/*"

packageExtensions:
  "@config-plugins/react-native-pdf@*":
    dependencies:
      "@expo/config-plugins": "^56"
  # The worklets Babel plugin imports these packages but 0.8.3 does not declare them.
  "react-native-worklets@0.8.3":
    dependencies:
      "@babel/generator": "7.29.7"
      "@babel/traverse": "7.29.7"
      "@babel/types": "7.29.7"

allowBuilds:
  "@posthog/cli": true
  core-js: false
  esbuild: false
  msw: false

overrides:
  esbuild: 0.28.1
  tmp: 0.2.7
  uuid: 11.1.1

minimumReleaseAgeExclude:
  - '@expo/cli@56.1.21'
  - '@expo/config-plugins@56.0.14'
  - '@expo/config@56.0.13'
  - '@expo/fingerprint@0.19.9'
  - '@expo/image-utils@0.10.4'
  - '@expo/metro-config@56.0.18'
  - '@expo/prebuild-config@56.0.21'
  - '@expo/require-utils@56.1.6'
  - '@expo/router-server@56.0.17'
  - babel-preset-expo@56.0.18
  - expo-asset@56.0.21
  - expo-constants@56.0.22
  - expo-modules-autolinking@56.0.21
  - expo-modules-core@56.0.22
  - expo@56.0.17
  - '@expo/metro-runtime@56.0.18'
  - '@expo/ui@56.0.23'
  - expo-dev-client@56.0.24
  - expo-dev-launcher@56.0.25
  - expo-dev-menu@56.0.21
  - expo-linking@56.0.16
  - expo-router@56.2.16
  - expo-sharing@56.0.23
  - expo-updates@56.0.23
  - expo-web-browser@56.0.6
