services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jedidiah
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jedidiah"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-init:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    command:
      - sh
      - -c
      - |
        psql -h postgres -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'jedidiah_template'" | grep -q 1 ||
          psql -h postgres -U postgres -d postgres -c "CREATE DATABASE jedidiah_template"
        exec tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h postgres -U postgres -d jedidiah_template"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"

volumes:
  postgres_data:
