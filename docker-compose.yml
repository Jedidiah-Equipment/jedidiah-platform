services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jedidiah
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jedidiah"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-init:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    command:
      - sh
      - -c
      - |
        psql -h postgres -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'jedidiah_template'" | grep -q 1 ||
          psql -h postgres -U postgres -d postgres -c "CREATE DATABASE jedidiah_template"
        exec tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h postgres -U postgres -d jedidiah_template"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${DOCUMENT_STORAGE_ACCESS_KEY_ID:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${DOCUMENT_STORAGE_SECRET_ACCESS_KEY:-minioadmin}"
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      DOCUMENT_STORAGE_ACCESS_KEY_ID: "${DOCUMENT_STORAGE_ACCESS_KEY_ID:-minioadmin}"
      DOCUMENT_STORAGE_BUCKET: "${DOCUMENT_STORAGE_BUCKET:-jedidiah-documents}"
      DOCUMENT_STORAGE_SECRET_ACCESS_KEY: "${DOCUMENT_STORAGE_SECRET_ACCESS_KEY:-minioadmin}"
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$DOCUMENT_STORAGE_ACCESS_KEY_ID" "$$DOCUMENT_STORAGE_SECRET_ACCESS_KEY"
        mc mb --ignore-existing "local/$$DOCUMENT_STORAGE_BUCKET"
        exec tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "mc ls \"local/$$DOCUMENT_STORAGE_BUCKET\" >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"

volumes:
  postgres_data:
  minio_data:
